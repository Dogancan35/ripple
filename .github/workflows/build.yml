name: Build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.0"

      - name: Generate project
        run: |
          if ! command -v xcodegen &> /dev/null; then brew install xcodegen; fi
          xcodegen generate

      - name: Build
        run: |
          xcodebuild -project Ripple.xcodeproj \
            -scheme Ripple \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            build 2>&1 | tail -30
