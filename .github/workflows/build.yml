name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup XcodeGen
        run: |
          which xcodegen || brew install xcodegen

      - name: Generate project
        run: |
          cd Ripple
          python3 gen_ripple.py

      - name: Build
        run: |
          cd Ripple
          xcodebuild -project Ripple.xcodeproj -scheme Ripple -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 15' build CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO